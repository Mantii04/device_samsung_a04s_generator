name: Generate Device Tree for SM-A047F

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            device-tree-compiler \
            android-sdk-libsparse-utils \
            unzip \
            wget \
            lz4 \
            python3 \
            git \
            megatools \
            p7zip-full

      - name: Download firmware from Mega (with retries)
        run: |
          # Download with retry and rate limit
          megatools dl \
            --num-retries 5 \
            --limit-rate 2M \
            --path . \
            'https://mega.nz/file/nAFiRCKB#p6iDVa0eL1E0JCsspVjkYTiCXPqR3ImAg_jGsgPbAMY'
          echo "Download completed. Listing files:"
          ls -la
          # Check file size (print)
          FW_ZIP=$(ls *.zip 2>/dev/null | head -n1)
          if [ -n "$FW_ZIP" ]; then
            echo "Downloaded file: $FW_ZIP"
            du -h "$FW_ZIP"
            # Check if it's a valid zip
            if file "$FW_ZIP" | grep -q "Zip archive"; then
              echo "ZIP is valid."
            else
              echo "WARNING: File does not appear to be a valid ZIP. File type:"
              file "$FW_ZIP"
              exit 1
            fi
          else
            echo "No ZIP file found after download!"
            exit 1
          fi

      - name: Extract firmware zip (using 7z)
        run: |
          FW_ZIP=$(ls *.zip 2>/dev/null | head -n1)
          if [ -z "$FW_ZIP" ]; then
            echo "No ZIP file to extract!"
            exit 1
          fi
          echo "Extracting $FW_ZIP with 7z..."
          7z x "$FW_ZIP" -y
          # After extraction, list all files
          echo "Extracted files:"
          ls -la

      - name: Find AP tarball and extract it
        run: |
          AP_TAR=$(ls AP_*.tar.md5 2>/dev/null | head -n1)
          if [ -z "$AP_TAR" ]; then
            AP_TAR=$(ls AP_*.tar 2>/dev/null | head -n1)
          fi
          if [ -z "$AP_TAR" ]; then
            echo "No AP tarball found! Files present:"
            ls -la
            exit 1
          fi
          echo "Extracting $AP_TAR"
          tar -xvf "$AP_TAR"
          ls -la

      - name: Decompress .lz4 files
        run: |
          for f in *.lz4; do
            if [ -f "$f" ]; then
              lz4 -d "$f" "$(basename "$f" .lz4)"
            fi
          done
          ls -la

      - name: Find boot.img and system.img
        run: |
          if [ ! -f boot.img ]; then
            echo "boot.img not found!"
            exit 1
          fi
          if [ -f system.img ]; then
            echo "system.img found"
          elif [ -f super.img ]; then
            echo "ERROR: super.img found but we need a separate system.img."
            echo "Your firmware uses a super partition. Please upload a firmware that has system.img directly."
            exit 1
          else
            echo "No system.img or super.img found!"
            exit 1
          fi

      - name: Clone mkvendor (Android Dump tool)
        run: |
          git clone https://github.com/phhusson/vendor_android_dump.git
          chmod +x vendor_android_dump/mkvendor.sh

      - name: Generate device tree
        run: |
          cd vendor_android_dump
          ./mkvendor.sh -d a04s -b ../boot.img -s ../system.img
          cp -r device/samsung/a04s ../generated_device_tree

      - name: Upload generated device tree as artifact
        uses: actions/upload-artifact@v4
        with:
          name: device_tree_a04s
          path: generated_device_tree/