name: Generate Device Tree for SM-A047F

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            device-tree-compiler \
            android-sdk-libsparse-utils \
            unzip \
            wget \
            lz4 \
            python3 \
            git \
            megatools

      - name: Download firmware from Mega
        run: |
          megatools dl --path . 'https://mega.nz/file/nAFiRCKB#p6iDVa0eL1E0JCsspVjkYTiCXPqR3ImAg_jGsgPbAMY'
          ls -la

      - name: Extract firmware zip and AP tarball
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            unzip *.zip
          fi
          AP_TAR=$(ls AP_*.tar.md5 2>/dev/null | head -n1)
          if [ -z "$AP_TAR" ]; then
            AP_TAR=$(ls AP_*.tar 2>/dev/null | head -n1)
          fi
          if [ -z "$AP_TAR" ]; then
            echo "No AP tarball found!"
            exit 1
          fi
          echo "Extracting $AP_TAR"
          tar -xvf $AP_TAR
          ls -la

      - name: Decompress .lz4 files
        run: |
          for f in *.lz4; do
            if [ -f "$f" ]; then
              lz4 -d "$f" "$(basename "$f" .lz4)"
            fi
          done
          ls -la

      - name: Find boot.img and system.img
        run: |
          if [ ! -f boot.img ]; then
            echo "boot.img not found!"
            exit 1
          fi
          if [ -f system.img ]; then
            echo "system.img found"
          elif [ -f super.img ]; then
            echo "ERROR: super.img found but we need a separate system.img."
            echo "Your firmware uses a super partition. Please upload a firmware that has system.img directly (or extract it yourself)."
            exit 1
          else
            echo "No system.img or super.img found!"
            exit 1
          fi

      - name: Clone mkvendor (Android Dump tool)
        run: |
          git clone https://github.com/phhusson/vendor_android_dump.git
          chmod +x vendor_android_dump/mkvendor.sh

      - name: Generate device tree
        run: |
          cd vendor_android_dump
          ./mkvendor.sh -d a04s -b ../boot.img -s ../system.img
          cp -r device/samsung/a04s ../generated_device_tree

      - name: Upload generated device tree as artifact
        uses: actions/upload-artifact@v4
        with:
          name: device_tree_a04s
          path: generated_device_tree/