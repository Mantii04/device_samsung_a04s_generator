name: Generate Device Tree for SM-A047F

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            device-tree-compiler \
            android-sdk-libsparse-utils \
            unzip \
            wget \
            lz4 \
            python3 \
            git \
            p7zip-full \
            python3-pip
          pip3 install gdown

      - name: Download firmware from Google Drive using gdown
        run: |
          FILE_ID="1zKBfFW1eU2gMU39R5QJhOSzkTAlJGn7U"
          echo "Downloading file ID: $FILE_ID"
          gdown "https://drive.google.com/uc?id=${FILE_ID}" -O firmware.zip --fuzzy
          echo "Download completed. File size:"
          du -h firmware.zip
          ls -la

      - name: Verify downloaded file
        run: |
          if [ ! -f firmware.zip ]; then
            echo "ERROR: firmware.zip not found!"
            exit 1
          fi
          # Check if it's a valid zip
          if 7z t firmware.zip >/dev/null 2>&1; then
            echo "ZIP archive is valid."
          else
            echo "ERROR: ZIP archive is corrupted or incomplete!"
            file firmware.zip
            exit 1
          fi

      - name: Extract firmware zip
        run: |
          7z x firmware.zip -y
          ls -la

      - name: Find AP tarball and extract it
        run: |
          AP_TAR=$(ls AP_*.tar.md5 2>/dev/null | head -n1)
          if [ -z "$AP_TAR" ]; then
            AP_TAR=$(ls AP_*.tar 2>/dev/null | head -n1)
          fi
          if [ -z "$AP_TAR" ]; then
            echo "No AP tarball found! Files present:"
            ls -la
            exit 1
          fi
          echo "Extracting $AP_TAR"
          tar -xvf "$AP_TAR"
          ls -la

      - name: Decompress .lz4 files
        run: |
          for f in *.lz4; do
            if [ -f "$f" ]; then
              lz4 -d "$f" "$(basename "$f" .lz4)"
            fi
          done
          ls -la

      - name: Find boot.img and system.img
        run: |
          if [ ! -f boot.img ]; then
            echo "boot.img not found!"
            exit 1
          fi
          if [ -f system.img ]; then
            echo "system.img found"
          elif [ -f super.img ]; then
            echo "ERROR: super.img found but we need a separate system.img."
            echo "Your firmware uses a super partition. Please upload a firmware that has system.img directly."
            exit 1
          else
            echo "No system.img or super.img found!"
            exit 1
          fi

      - name: Clone mkvendor (Android Dump tool)
        run: |
          git clone https://github.com/phhusson/vendor_android_dump.git
          chmod +x vendor_android_dump/mkvendor.sh

      - name: Generate device tree
        run: |
          cd vendor_android_dump
          ./mkvendor.sh -d a04s -b ../boot.img -s ../system.img
          cp -r device/samsung/a04s ../generated_device_tree

      - name: Upload generated device tree as artifact
        uses: actions/upload-artifact@v4
        with:
          name: device_tree_a04s
          path: generated_device_tree/